services:
  - type: web
    name: vm-dashboard-api
    runtime: docker
    rootDir: apps/api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LIVE_DATA_PROVIDER
        value: seeded
      - key: LIVE_POLL_INTERVAL_SECONDS
        value: 30
      - key: MODEL_VERSION
        value: wc-v0.2-norway
      - key: ALLOWED_BROADCASTER_HOSTS
        value: nrk.no,tv.nrk.no,tv2.no,play.tv2.no
      - key: ALLOWED_ORIGINS
        value: https://vm-dashboard-og-predikering.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: vm-dashboard-db
          property: connectionString

databases:
  - name: vm-dashboard-db
    plan: free
